<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Student Study Tracker with AI Exam Generator">
  <title>StudyTracker - Smart Study Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
</head>
<body>
  <nav id="navbar" class="navbar hidden">
    <div class="nav-container">
      <a href="#/dashboard" class="nav-logo">
        <i class="fas fa-book-open"></i>
        <span>StudyTracker</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <i class="fas fa-bars"></i>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="#/dashboard" class="nav-link" data-route="dashboard">
          <i class="fas fa-th-large"></i> Dashboard
        </a>
        <div class="nav-right">
          <button class="btn-icon" id="themeToggle" title="Toggle theme">
            <i class="fas fa-sun"></i>
          </button>
          <div class="nav-user" id="navUser">
            <i class="fas fa-user-circle"></i>
            <span id="navUserName"></span>
          </div>
          <button class="btn-icon" id="logoutBtn" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main id="app">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </main>

  <div id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/course.js"></script>
  <script src="/js/reader.js"></script>
  <script src="/js/exam.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
